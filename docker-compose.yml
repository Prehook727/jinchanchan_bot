# 版本号：适配Docker Compose版本（3.8兼容大部分环境）
version: '3.8'

# 定义服务（每个服务对应一个容器）
services:
  # 1. 金铲铲机器人服务
  jinchanchan-bot:
    # 基于当前目录的Dockerfile构建镜像
    build: .
    # 容器重启策略：异常退出时自动重启（保证服务可用性）
    restart: always
    # 加载环境变量文件（敏感信息存在.env里，不要硬编码）
    env_file: .env
    # 容器名称（方便管理）
    container_name: jinchanchan-bot
    # 网络：和监控容器共享网络
    networks:
      - bot-monitor-network
    # 日志配置：限制日志大小，避免占满磁盘
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. Prometheus监控采集服务
  prometheus:
    # 使用官方镜像
    image: prom/prometheus:v2.45.0
    restart: always
    container_name: prometheus
    # 挂载配置文件和数据卷（持久化监控数据）
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml  # 自定义监控配置
      - prometheus-data:/prometheus                     # 监控数据持久化
    # 暴露端口：EC2的9090端口映射到容器的9090端口（用于访问Prometheus）
    ports:
      - "9090:9090"
    networks:
      - bot-monitor-network

  # 3. Grafana监控可视化服务
  grafana:
    image: grafana/grafana:9.5.2
    restart: always
    container_name: grafana
    # 持久化Grafana数据（面板配置、用户信息）
    volumes:
      - grafana-data:/var/lib/grafana
    # 暴露端口：EC2的3000端口映射到容器的3000端口（访问Grafana面板）
    ports:
      - "3000:3000"
    # 依赖：等Prometheus启动后再启动
    depends_on:
      - prometheus
    networks:
      - bot-monitor-network

# 定义数据卷（持久化数据，容器删除后数据不丢失）
volumes:
  prometheus-data:
  grafana-data:

# 定义自定义网络（让三个容器互通）
networks:
  bot-monitor-network:
    driver: bridge